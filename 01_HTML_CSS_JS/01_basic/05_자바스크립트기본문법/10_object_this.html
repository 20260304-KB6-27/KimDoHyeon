<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      class Person {
        constructor(name) {
          this.name = name;
        }
        eat(food) {
          alert(this.name + '이 ' + food + '을/를 먹습니다.');
        }
      }
      let person1 = new Person('dodo');
      let person2 = new Person('bear');

      person1.eat('아슈크림');
      person2.eat('꿀');

      let person = {
        name: '유인성',
        eat: function (food) {
          alert(this.name + '이 ' + food + '을/를 먹습니다.');
        },
      };
      person.eat('밥');
    </script>
  </head>

  <body></body>
</html>
